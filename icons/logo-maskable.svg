<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="MULTINICHE AI">
  <title>MULTINICHE AI</title>

  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1b0404"/>
      <stop offset="1" stop-color="#0a0400"/>
    </linearGradient>
    <radialGradient id="core" cx="50%" cy="42%" r="58%">
      <stop offset="0" stop-color="#ff2a2a" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#ff2a2a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="vignette" cx="50%" cy="46%" r="62%">
      <stop offset="0" stop-color="#000000" stop-opacity="0.55"/>
      <stop offset="0.6" stop-color="#000000" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect x="0" y="0" width="512" height="512" rx="0" fill="url(#tile)"/>
  <rect x="0" y="0" width="512" height="512" rx="0" fill="url(#core)"/>
  <rect x="0" y="0" width="512" height="512" rx="0" fill="url(#vignette)"/>
  
  <g transform="translate(256 256) scale(0.72) translate(-256 -256)">
    <g fill="none" stroke="#ff2a2a" stroke-width="50" stroke-linejoin="round" stroke-linecap="round">
      <path d="M136 316 L136 152 L256 260 L376 152 L376 316" filter="url(#glow)"/>
    </g>
    <rect x="192" y="350" width="128" height="34" rx="17" fill="#ff2a2a" filter="url(#glow)"/>
  </g>
</svg>
