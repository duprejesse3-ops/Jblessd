  <rect x="16" y="16" width="1168" height="1168" rx="250" fill="none" stroke="#7a1f1f" stroke-width="7" opacity="0.55"/>
  <rect x="52" y="52" width="1096" height="1096" rx="222" fill="none" stroke="#7a1f1f" stroke-width="3.5" opacity="0.3"/>
  <g transform="translate(600 600) scale(2.1) translate(-256 -256)">
