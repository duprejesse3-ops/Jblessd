<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1200" width="1200" height="1200" role="img" aria-label="MULTINICHE AI">
  <title>MULTINICHE AI</title>

  <defs>
    <linearGradient id="tile-sq" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1b0404"/>
      <stop offset="1" stop-color="#0a0400"/>
    </linearGradient>
    <radialGradient id="core-sq" cx="50%" cy="42%" r="58%">
      <stop offset="0" stop-color="#ff2a2a" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#ff2a2a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="vignette-sq" cx="50%" cy="46%" r="62%">
