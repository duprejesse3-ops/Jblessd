[build]
  publish = "."
  functions = "netlify/functions"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# Baseline security headers applied to every response. Scoped to /* so both the
# static storefront and the edge-rendered pages inherit them. The Content-Security-Policy
# is deliberately tuned to the storefront's real dependencies:
#   - inline <script>/JSON-LD blocks and inline styles -> 'unsafe-inline'
#   - Google Fonts CSS + font files -> fonts.googleapis.com / fonts.gstatic.com
#   - Google Tag Manager / Analytics -> googletagmanager.com / google-analytics.com
#   - Google Ads conversion + remarketing (AW-…) -> googleadservices.com,
#     googleads.g.doubleclick.net, and google.com (ccm/rmkt collection endpoints)
# frame-ancestors 'none' plus X-Frame-Options block clickjacking; HSTS forces HTTPS.
[[headers]]
  for = "/*"
  [headers.values]
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), interest-cohort=()"
    Cross-Origin-Opener-Policy = "same-origin"
    Content-Security-Policy = "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; img-src 'self' data: https:; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com https://www.google-analytics.com https://www.googleadservices.com https://googleads.g.doubleclick.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://www.googletagmanager.com https://www.google-analytics.com https://*.google-analytics.com https://www.googleadservices.com https://googleads.g.doubleclick.net https://www.google.com; form-action 'self'; frame-src https://js.stripe.com https://checkout.stripe.com; upgrade-insecure-requests"

# Service worker must always revalidate so app updates ship immediately.
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/manifest.webmanifest"
  [headers.values]
    Content-Type = "application/manifest+json"
    Cache-Control = "public, max-age=0, must-revalidate"

# App icons can be cached aggressively.
[[headers]]
  for = "/icons/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"

# Root favicon served to browsers and Google's favicon crawler.
[[headers]]
  for = "/favicon.ico"
  [headers.values]
    Content-Type = "image/x-icon"
    Cache-Control = "public, max-age=604800"

# Digital Asset Links — proves this domain owns the Google Play TWA so the
# Android app runs full-screen with no browser address bar. Must be JSON.
[[headers]]
  for = "/.well-known/assetlinks.json"
  [headers.values]
    Content-Type = "application/json"
    Cache-Control = "public, max-age=0, must-revalidate"

# Bing Webmaster Tools site verification file — served from the root so Bing
# can confirm domain ownership. Must be XML and always revalidated.
[[headers]]
  for = "/BingSiteAuth.xml"
  [headers.values]
    Content-Type = "application/xml"
    Cache-Control = "public, max-age=0, must-revalidate"

