<title>MULTINICHE AI · Operator Console</title>
<link rel="icon" href="/favicon.ico" />
<style>
  :root {
    --bg: #05070a;
    --panel: #0a0e14;
    --edge: #16202c;
    --edge-soft: #101823;
    --fg: #cdd9e5;
    --dim: #5c6b7a;
    --phos: #e34f4f;      /* primary phosphor green */
    --phos-dim: #8f3f3f;
    --amber: #ffb454;
    --red: #ff5f6b;
    --cyan: #58c7f3;
    --mono: ui-monospace, "SF Mono", "SFMono-Regular", "JetBrains Mono", "Fira Code", Menlo, Consolas, monospace;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    background:
      radial-gradient(120% 80% at 50% -10%, #0d1420 0%, var(--bg) 60%) fixed;
    color: var(--fg);
    font-family: var(--mono);
    font-size: 14px;
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  /* faint scanline texture over everything */
  body::after {
    content: "";
    position: fixed; inset: 0;
    pointer-events: none;
    background: repeating-linear-gradient(
      to bottom, rgba(255,255,255,0.014) 0 1px, transparent 1px 3px);
    mix-blend-mode: overlay;
    z-index: 50;
  }

  /* ---- top status bar ---- */
  header {
    flex: 0 0 auto;
    display: flex; align-items: center; gap: 14px;
    padding: 10px 16px;
    background: linear-gradient(180deg, #0b111a, #080b11);
    border-bottom: 1px solid var(--edge);
  }
  .brand { display: flex; align-items: center; gap: 10px; font-weight: 600; letter-spacing: .14em; }
  .brand .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--phos);
    box-shadow: 0 0 10px var(--phos); animation: pulse 2.6s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.35} }
  .brand small { color: var(--dim); font-weight: 400; letter-spacing: .1em; }
  .spacer { flex: 1; }
  .stat { color: var(--dim); font-size: 12px; letter-spacing: .06em; }
  .stat b { color: var(--cyan); font-weight: 500; }
  .stat.ok b { color: var(--phos); }
  .stat.off b { color: var(--red); }
  .logout {
    background: transparent; color: var(--dim); border: 1px solid var(--edge);
    font-family: var(--mono); font-size: 12px; padding: 4px 10px; border-radius: 4px;
    cursor: pointer; letter-spacing: .08em; transition: .15s;
  }
  .logout:hover { color: var(--red); border-color: var(--red); }
  .logout[hidden] { display: none; }

  /* ---- main terminal area ---- */
  main { flex: 1 1 auto; min-height: 0; display: flex; justify-content: center; padding: 0 14px 14px; }
  .term {
    width: 100%; max-width: 940px;
    display: flex; flex-direction: column; min-height: 0;
    margin-top: 14px;
    background: linear-gradient(180deg, rgba(10,14,20,.9), rgba(6,9,13,.92));
    border: 1px solid var(--edge);
    border-radius: 10px;
    box-shadow: 0 0 0 1px rgba(0,0,0,.4), 0 30px 80px -40px rgba(0,0,0,.9),
                inset 0 1px 0 rgba(255,255,255,.03);
    overflow: hidden;
  }
  .term-bar {
    flex: 0 0 auto; display: flex; align-items: center; gap: 8px;
    padding: 8px 12px; border-bottom: 1px solid var(--edge-soft);
    background: rgba(255,255,255,.015);
  }
  .term-bar i { width: 11px; height: 11px; border-radius: 50%; display: inline-block; }
  .term-bar .r { background: #ff5f56; } .term-bar .y { background: #ffbd2e; } .term-bar .g { background: #27c93f; }
  .term-bar span { margin-left: 8px; color: var(--dim); font-size: 12px; letter-spacing: .05em; }

  .screen {
    flex: 1 1 auto; min-height: 0; overflow-y: auto;
    padding: 16px 18px; scroll-behavior: smooth;
  }
  .screen::-webkit-scrollbar { width: 10px; }
  .screen::-webkit-scrollbar-thumb { background: var(--edge); border-radius: 8px; }

  .line { white-space: pre-wrap; word-break: break-word; margin: 0 0 2px; }
  .row { display: flex; gap: 8px; margin: 10px 0 4px; }
  .row .ps { color: var(--phos-dim); flex: 0 0 auto; user-select: none; }
  .row .cmd { color: var(--fg); }
  .reply { color: var(--fg); margin: 2px 0 8px; padding-left: 2px; }
  .reply.err { color: var(--red); }
  .sys { color: var(--dim); }
  .sys b { color: var(--fg); font-weight: 500; }
  .accent { color: var(--phos); }
  .amber { color: var(--amber); }
  .cyan { color: var(--cyan); }
  .tools { color: var(--phos-dim); font-size: 12.5px; margin: 2px 0 6px; letter-spacing: .03em; }
  .banner { color: var(--phos); text-shadow: 0 0 12px rgba(227,79,79,.25); margin-bottom: 4px; }
  a { color: var(--cyan); }

  /* ---- input prompt ---- */
  .prompt-row {
    flex: 0 0 auto; display: flex; align-items: center; gap: 8px;
    padding: 12px 18px; border-top: 1px solid var(--edge-soft);
    background: rgba(255,255,255,.012);
  }
  .prompt-row .ps { color: var(--phos); user-select: none; }
  #input {
    flex: 1; background: transparent; border: none; outline: none;
    color: var(--fg); font-family: var(--mono); font-size: 14px; caret-color: var(--phos);
  }
  #input::placeholder { color: var(--edge); }
  #input:disabled { opacity: .5; }
  .cursor { width: 8px; height: 16px; background: var(--phos); display: inline-block;
    box-shadow: 0 0 8px var(--phos); animation: blink 1.1s step-end infinite; }
  @keyframes blink { 50% { opacity: 0; } }

  .thinking { color: var(--phos-dim); }
  .thinking::after { content: "▋"; animation: blink 1s step-end infinite; }

  /* ---- login gate ---- */
  .gate { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 18px; padding: 40px 18px; text-align: center; }
  .gate h1 { font-size: 15px; letter-spacing: .3em; color: var(--phos); margin: 0; text-shadow: 0 0 16px rgba(227,79,79,.3); }
  .gate p { color: var(--dim); margin: 0; max-width: 420px; font-size: 13px; }
  .lock { font-size: 30px; filter: drop-shadow(0 0 12px rgba(227,79,79,.4)); }
  .gate form { display: flex; gap: 8px; width: 100%; max-width: 380px; }
  .gate input {
    flex: 1; background: #060a0f; border: 1px solid var(--edge); color: var(--fg);
    font-family: var(--mono); font-size: 14px; padding: 11px 13px; border-radius: 6px; outline: none;
  }
  .gate input:focus { border-color: var(--phos-dim); box-shadow: 0 0 0 2px rgba(227,79,79,.12); }
  .gate button {
    background: var(--phos); color: #110404; border: none; font-family: var(--mono); font-weight: 600;
    padding: 0 18px; border-radius: 6px; cursor: pointer; letter-spacing: .06em; transition: .15s;
  }
  .gate button:hover { box-shadow: 0 0 18px rgba(227,79,79,.4); }
  .gate button:disabled { opacity: .5; cursor: default; box-shadow: none; }
  .gate .msg { min-height: 18px; font-size: 12.5px; }
  .gate .msg.err { color: var(--red); }
  .gate .msg.ok { color: var(--phos); }
  [hidden] { display: none !important; }

  @media (max-width: 560px) {
    header { padding: 9px 12px; gap: 10px; }
    .stat.hostname { display: none; }
    main { padding: 0 8px 8px; }
  }
</style>
</head>

  <header>
    <div class="brand"><span class="dot"></span>MULTINICHE&nbsp;AI <small>// operator console</small></div>
    <div class="spacer"></div>
    <div class="stat hostname">node <b>jblessd</b></div>
    <div class="stat" id="link">gateway <b id="linkState">…</b></div>
    <button class="logout" id="logout" hidden>logout</button>
  </header>

  <main>
    <section class="term">
      <div class="term-bar"><i class="r"></i><i class="y"></i><i class="g"></i><span>admin@multiniche — secure session</span></div>

      <!-- login gate -->
      <div class="gate" id="gate">
        <div class="lock">⌘</div>
        <h1>RESTRICTED</h1>
        <p id="gateInfo">This workstation is private to the store owner. Enter the admin password to open a session.</p>
        <form id="loginForm" autocomplete="off">
          <input type="password" id="password" placeholder="admin password" autocomplete="current-password" aria-label="Admin password" />
          <button type="submit" id="loginBtn">enter</button>
        </form>
        <div class="msg" id="gateMsg"></div>
      </div>

      <!-- terminal -->
      <div class="screen" id="screen" hidden></div>
      <div class="prompt-row" id="promptRow" hidden>
        <span class="ps">admin@multiniche:~$</span>
        <input id="input" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false"
               placeholder="ask about the store, or type 'help'" />
      </div>
    </section>
  </main>

<script>
(function () {
  "use strict";
  var AUTH = "/api/admin-auth";
  var CONSOLE = "/api/admin-console";
  var BUILDER = "/api/product-builder";
  var ADS = "/api/google-ads-builder";

  var el = function (id) { return document.getElementById(id); };
  var gate = el("gate"), gateMsg = el("gateMsg"), gateInfo = el("gateInfo");
  var loginForm = el("loginForm"), password = el("password"), loginBtn = el("loginBtn");
  var screen = el("screen"), promptRow = el("promptRow"), input = el("input");
  var logout = el("logout"), linkState = el("linkState"), linkStat = el("link");

  var history = [];           // AI conversation [{role, content}]
  var cmdHistory = [];        // typed command recall
  var cmdIndex = -1;
  var busy = false;

  // ---------- rendering helpers ----------
  function scrollDown() { screen.scrollTop = screen.scrollHeight; }
  function node(cls, text) {
    var d = document.createElement("div");
    if (cls) d.className = cls;
    if (text != null) d.textContent = text;
    return d;
  }
  function print(cls, text) { var n = node(cls, text); screen.appendChild(n); scrollDown(); return n; }
  function printHTML(cls, html) { var n = node(cls); n.innerHTML = html; screen.appendChild(n); scrollDown(); return n; }
  function echoCommand(cmd) {
    var row = node("row");
    row.appendChild(node("ps", "admin@multiniche:~$"));
    row.appendChild(node("cmd", cmd));
    screen.appendChild(row); scrollDown();
  }

  function banner() {
    printHTML("line banner",
      "  __  __ _   _ _    _____ ___ _   _ ___ ___ _  _ ___    _   ___\n" +
      " |  \\/  | | | | |  |_   _|_ _| \\ | |_ _/ __| || | __|  /_\\ |_ _|\n" +
      " | |\\/| | |_| | |__  | |  | || .` || | (__| __ | _|  / _ \\ | |\n" +
      " |_|  |_|\\___/|____| |_| |___|_|\\_|___\\___|_||_|___| /_/ \\_\\___|");
    print("sys", "operator console · AI-powered · read-only telemetry");
    printHTML("sys", "type <b>help</b> for commands, or just ask a question in plain English.");
    print("", "");
  }

  var HELP = [
    "",
    "COMMANDS",
    "  help            show this help",
    "  status          gateway + session status",
    "  build <brief>   design a new product with the Product Builder agent",
    "  drafts          list products the builder has designed",
    "  ads [sku] [| goal]   build a paste-ready Google Ads plan (headlines, keywords…)",
    "  adplans         list Google Ads plans the builder has generated",
    "  clear           clear the screen",
    "  logout          end this session",
    "",
    "EVERYTHING ELSE is sent to the AI operator, which can read live store data:",
    "  • catalog, pricing        • subscribers & sign-up sources",
    "  • reviews & ratings        • contact-form messages",
    "  • marketing campaigns      • live proofs shoppers saved",
    "  • product drafts           • security / site-health / crawl status",
    "",
    "examples:",
    "  \"how is the store doing today?\"",
    "  \"list the products and their prices\"",
    "  build a $20 automation for freelance video editors",
    "  build something for architects, agent config, ~$40",
    "  ads                          whole-store Google Ads plan",
    "  ads AI-PP-046                plan for one product",
    "  ads AI-AG-012 | push the launch discount",
    ""
  ].join("\n");

  // ---------- session bootstrap ----------
  function setLink(state, cls) { linkState.textContent = state; linkStat.className = "stat " + (cls || ""); }

  async function bootstrap() {
    try {
      var r = await fetch(AUTH, { headers: { "accept": "application/json" } });
      var j = await r.json();
      if (!j.configured) {
        setLink("unconfigured", "off");
        gateInfo.innerHTML = "The admin console is not configured yet. Set an <b>ADMIN_PASSWORD</b> " +
          "environment variable in the Netlify site settings and redeploy, then reload this page.";
        password.disabled = true; loginBtn.disabled = true;
        return;
      }
      setLink("ready", "ok");
      if (j.authed) { openConsole(true); }
    } catch (e) {
      setLink("offline", "off");
    }
  }

  function openConsole(resumed) {
    gate.hidden = true;
    screen.hidden = false;
    promptRow.hidden = false;
    logout.hidden = false;
    if (!screen.dataset.booted) {
      banner();
      if (resumed) print("sys", "session resumed.");
      screen.dataset.booted = "1";
    }
    input.focus();
  }

  // ---------- login ----------
  loginForm.addEventListener("submit", async function (e) {
    e.preventDefault();
    var pw = password.value;
    if (!pw) return;
    loginBtn.disabled = true; gateMsg.className = "msg"; gateMsg.textContent = "authenticating…";
    try {
      var r = await fetch(AUTH, {
        method: "POST",
        headers: { "content-type": "application/json" },
        body: JSON.stringify({ password: pw })
      });
      if (r.ok) {
        gateMsg.className = "msg ok"; gateMsg.textContent = "access granted";
        password.value = "";
        setTimeout(function () { openConsole(false); }, 220);
      } else {
        var j = {}; try { j = await r.json(); } catch (_) {}
        gateMsg.className = "msg err";
        gateMsg.textContent = j.error || (r.status === 429 ? "too many attempts" : "access denied");
      }
    } catch (_) {
      gateMsg.className = "msg err"; gateMsg.textContent = "network error";
    } finally {
      loginBtn.disabled = false;
    }
  });

  // ---------- terminal input ----------
  input.addEventListener("keydown", function (e) {
    if (e.key === "Enter") { e.preventDefault(); submit(); }
    else if (e.key === "ArrowUp") { e.preventDefault(); recall(-1); }
    else if (e.key === "ArrowDown") { e.preventDefault(); recall(1); }
    else if (e.key === "l" && e.ctrlKey) { e.preventDefault(); doClear(); }
  });

  function recall(dir) {
    if (!cmdHistory.length) return;
    if (cmdIndex === -1) cmdIndex = cmdHistory.length;
    cmdIndex = Math.max(0, Math.min(cmdHistory.length, cmdIndex + dir));
    input.value = cmdHistory[cmdIndex] || "";
    var end = input.value.length; setTimeout(function(){ input.setSelectionRange(end, end); }, 0);
  }

  function doClear() { screen.innerHTML = ""; screen.dataset.booted = ""; banner(); }

  async function doLogout() {
    try { await fetch(AUTH, { method: "DELETE" }); } catch (_) {}
    location.reload();
  }

  function submit() {
    if (busy) return;
    var raw = input.value.trim();
    if (!raw) return;
    input.value = "";
    cmdHistory.push(raw); cmdIndex = -1;
    echoCommand(raw);

    var lower = raw.toLowerCase();
    if (lower === "help" || lower === "?") { print("sys", HELP); return; }
    if (lower === "clear" || lower === "cls") { doClear(); return; }
    if (lower === "logout" || lower === "exit" || lower === "quit") { print("sys", "closing session…"); doLogout(); return; }
    if (lower === "status") {
      print("sys", "gateway: " + linkState.textContent + "\nsession: active\nmodel: claude-sonnet-4-5\naccess: read-only + product builder");
      return;
    }
    if (lower === "build" || lower === "build ") {
      print("sys", "usage: build <brief>   e.g. build a $20 automation for freelance video editors");
      return;
    }
    if (lower.indexOf("build ") === 0) { buildProduct(raw.slice(6).trim()); return; }
    if (lower === "drafts") { listDrafts(); return; }
    if (lower === "ads" || lower.indexOf("ads ") === 0) { buildAds(raw.slice(3).trim()); return; }
    if (lower === "adplans") { listAdPlans(); return; }
    ask(raw);
  }

  // ---------- AI round-trip ----------
  async function ask(text) {
    busy = true; input.disabled = true;
    history.push({ role: "user", content: text });
    var thinking = print("thinking", "operator thinking");
    try {
      var r = await fetch(CONSOLE, {
        method: "POST",
        headers: { "content-type": "application/json" },
        body: JSON.stringify({ messages: history })
      });
      var j = {}; try { j = await r.json(); } catch (_) {}
      thinking.remove();
      if (!r.ok) {
        if (r.status === 401) {
          print("reply err", (j.error || "session expired") + " — reloading…");
          setTimeout(function(){ location.reload(); }, 1200);
        } else {
          print("reply err", j.error || ("error " + r.status));
        }
        history.pop();
        return;
      }
      if (j.toolsUsed && j.toolsUsed.length) {
        var uniq = j.toolsUsed.filter(function (v, i, a) { return a.indexOf(v) === i; });
        print("tools", "▸ queried: " + uniq.join(", "));
      }
      var reply = (j.reply || "(no output)");
      history.push({ role: "assistant", content: reply });
      print("reply", reply);
    } catch (_) {
      thinking.remove();
      print("reply err", "network error — the workstation is unreachable.");
      history.pop();
    } finally {
      busy = false; input.disabled = false; input.focus();
    }
  }

  // ---------- product builder ----------
  var CAT_LABEL = {
    prompts: "Prompt Pack", automations: "Automation Blueprint",
    templates: "Doc Template", agents: "Agent Config"
  };

  function renderDraft(d) {
    var price = "$" + Number(d.price).toFixed(2);
    var cat = CAT_LABEL[d.category] || d.category;
    printHTML("reply",
      "<span class='accent'>" + escapeHtml(d.sku) + "</span>  " +
        "<b>" + escapeHtml(d.name) + "</b>\n" +
      "<span class='sys'>" + escapeHtml(cat) + " · " + escapeHtml(d.niche) +
        " · <span class='cyan'>" + price + "</span> · " + escapeHtml(d.format) + "</span>\n" +
      escapeHtml(d.blurb) + "\n" +
      "<span class='amber'>spec:</span> " + escapeHtml(d.spec));
  }

  function escapeHtml(s) {
    return String(s == null ? "" : s)
      .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
  }

  async function buildProduct(brief) {
    if (busy) return;
    busy = true; input.disabled = true;
    var thinking = print("thinking", "product builder designing");
    try {
      var r = await fetch(BUILDER, {
        method: "POST",
        headers: { "content-type": "application/json" },
        body: JSON.stringify({ brief: brief })
      });
      var j = {}; try { j = await r.json(); } catch (_) {}
      thinking.remove();
      if (!r.ok) {
        if (r.status === 401) {
          print("reply err", (j.error || "session expired") + " — reloading…");
          setTimeout(function(){ location.reload(); }, 1200);
        } else {
          print("reply err", j.error || ("error " + r.status));
        }
        return;
      }
      var d = j.draft;
      print("tools", "▸ built via " + (d && d.source === "heuristic" ? "template fallback" : "claude-sonnet-4-5") +
        (j.persisted ? " · saved as draft" : " · not saved (db unavailable)"));
      if (d) renderDraft(d);
      printHTML("sys", "review it, then run <b>drafts</b> to see all designs. drafts stay out of the live catalog until you promote them.");
    } catch (_) {
      thinking.remove();
      print("reply err", "network error — the builder is unreachable.");
    } finally {
      busy = false; input.disabled = false; input.focus();
    }
  }

  async function listDrafts() {
    if (busy) return;
    busy = true; input.disabled = true;
    var thinking = print("thinking", "loading drafts");
    try {
      var r = await fetch(BUILDER, { headers: { "accept": "application/json" } });
      var j = {}; try { j = await r.json(); } catch (_) {}
      thinking.remove();
      if (!r.ok) { print("reply err", j.error || ("error " + r.status)); return; }
      var drafts = j.drafts || [];
      if (!drafts.length) {
        printHTML("sys", "no product drafts yet. run <b>build &lt;brief&gt;</b> to design one.");
        return;
      }
      print("sys", drafts.length + " draft" + (drafts.length === 1 ? "" : "s") + " (newest first):");
      drafts.forEach(renderDraft);
    } catch (_) {
      thinking.remove();
      print("reply err", "network error — the builder is unreachable.");
    } finally {
      busy = false; input.disabled = false; input.focus();
    }
  }

  // ---------- google ads builder ----------
  // Turn a keyword {text, matchType} into the exact token you paste into Google
  // Ads: broad = plain, phrase = "quoted", exact = [bracketed].
  function kwToken(k) {
    var t = String(k && k.text != null ? k.text : "");
    if (!t) return "";
    if (k.matchType === "exact") return "[" + t + "]";
    if (k.matchType === "phrase") return '"' + t + '"';
    return t;
  }

  function renderAdPlan(p) {
    var a = p.assets || {};
    var head = (a.headlines || []);
    var desc = (a.descriptions || []);
    var kws = (a.keywords || []);
    var negs = (a.negativeKeywords || []);
    var sites = (a.sitelinks || []);
    var calls = (a.callouts || []);
    var snip = a.structuredSnippet || { header: "", values: [] };

    var lines = [];
    lines.push("<span class='accent'>" + escapeHtml(p.productName) + "</span> "
      + "<span class='sys'>· google ads plan" + (p.goal ? " · goal: " + escapeHtml(p.goal) : "") + "</span>");
    lines.push("<span class='amber'>Final URL:</span> " + escapeHtml(a.finalUrl || ""));
    if (a.displayPath) {
      lines.push("<span class='amber'>Display path:</span> /"
        + escapeHtml(a.displayPath.path1 || "") + "/" + escapeHtml(a.displayPath.path2 || ""));
    }

    lines.push("");
    lines.push("<span class='cyan'>HEADLINES</span> <span class='sys'>(≤30 chars each · paste one per headline slot)</span>");
    head.forEach(function (h) { lines.push("  " + escapeHtml(h) + " <span class='sys'>(" + h.length + ")</span>"); });

    lines.push("");
    lines.push("<span class='cyan'>DESCRIPTIONS</span> <span class='sys'>(≤90 chars each)</span>");
    desc.forEach(function (d) { lines.push("  " + escapeHtml(d) + " <span class='sys'>(" + d.length + ")</span>"); });

    lines.push("");
    lines.push("<span class='cyan'>KEYWORDS</span> <span class='sys'>(paste as-is — quotes = phrase, [ ] = exact)</span>");
    kws.forEach(function (k) { lines.push("  " + escapeHtml(kwToken(k))); });

    if (negs.length) {
      lines.push("");
      lines.push("<span class='cyan'>NEGATIVE KEYWORDS</span>");
      lines.push("  " + escapeHtml(negs.join(", ")));
    }

    if (sites.length) {
      lines.push("");
      lines.push("<span class='cyan'>SITELINKS</span>");
      sites.forEach(function (s) {
        lines.push("  <b>" + escapeHtml(s.text) + "</b> — " + escapeHtml(s.description1)
          + (s.description2 ? " / " + escapeHtml(s.description2) : ""));
      });
    }

    if (calls.length) {
      lines.push("");
      lines.push("<span class='cyan'>CALLOUTS</span>");
      lines.push("  " + escapeHtml(calls.join(" · ")));
    }

    if (snip.values && snip.values.length) {
      lines.push("");
      lines.push("<span class='cyan'>STRUCTURED SNIPPET</span>");
      lines.push("  " + escapeHtml(snip.header) + ": " + escapeHtml(snip.values.join(", ")));
    }

    printHTML("reply", lines.join("\n"));
  }

  // Parse "ads [sku] [| goal]" into { sku, goal }. A bare token with no spaces
  // is treated as a SKU; anything with spaces (and no "|") is treated as a goal.
  function parseAdsArgs(arg) {
    arg = (arg || "").trim();
    if (!arg) return { sku: "", goal: "" };
    var bar = arg.indexOf("|");
    if (bar !== -1) {
      return { sku: arg.slice(0, bar).trim(), goal: arg.slice(bar + 1).trim() };
    }
    if (/\s/.test(arg)) return { sku: "", goal: arg };
    return { sku: arg, goal: "" };
  }

  async function buildAds(arg) {
    if (busy) return;
    var parsed = parseAdsArgs(arg);
    busy = true; input.disabled = true;
    var thinking = print("thinking", "google ads builder writing your plan");
    try {
      var r = await fetch(ADS, {
        method: "POST",
        headers: { "content-type": "application/json" },
        body: JSON.stringify({ sku: parsed.sku, goal: parsed.goal })
      });
      var j = {}; try { j = await r.json(); } catch (_) {}
      thinking.remove();
      if (!r.ok) {
        if (r.status === 401) {
          print("reply err", (j.error || "session expired") + " — reloading…");
          setTimeout(function(){ location.reload(); }, 1200);
        } else {
          print("reply err", j.error || ("error " + r.status));
        }
        return;
      }
      var p = j.plan;
      print("tools", "▸ built via " + (p && p.source === "heuristic" ? "template fallback" : "claude-sonnet-4-5") +
        (j.persisted ? " · saved" : " · not saved (db unavailable)"));
      if (p) renderAdPlan(p);
      printHTML("sys", "copy each field into Google Ads. run <b>ads</b> again to regenerate, or <b>adplans</b> to review past plans.");
    } catch (_) {
      thinking.remove();
      print("reply err", "network error — the ads builder is unreachable.");
    } finally {
      busy = false; input.disabled = false; input.focus();
    }
  }

  async function listAdPlans() {
    if (busy) return;
    busy = true; input.disabled = true;
    var thinking = print("thinking", "loading ad plans");
    try {
      var r = await fetch(ADS, { headers: { "accept": "application/json" } });
      var j = {}; try { j = await r.json(); } catch (_) {}
      thinking.remove();
      if (!r.ok) { print("reply err", j.error || ("error " + r.status)); return; }
      var plans = j.plans || [];
      if (!plans.length) {
        printHTML("sys", "no ad plans yet. run <b>ads</b> (optionally with a sku) to generate one.");
        return;
      }
      print("sys", plans.length + " ad plan" + (plans.length === 1 ? "" : "s") + " (newest first):");
      plans.forEach(renderAdPlan);
    } catch (_) {
      thinking.remove();
      print("reply err", "network error — the ads builder is unreachable.");
    } finally {
      busy = false; input.disabled = false; input.focus();
    }
  }

  logout.addEventListener("click", doLogout);
  document.addEventListener("click", function (e) {
    if (!promptRow.hidden && !e.target.closest("a") && window.getSelection().isCollapsed) input.focus();
  });

  bootstrap();
})();
</script>
